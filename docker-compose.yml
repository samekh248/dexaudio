services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dexaudio
      POSTGRES_PASSWORD: dexaudio
      POSTGRES_DB: dexaudio
    volumes:
      - dexaudio_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dexaudio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dexaudio_pg:
